spring.datasource.url = ${DB_URL}
spring.datasource.username  = ${DB_USERNAME}
spring.datasource.password = ${DB_PASSWORD}
# Driver and Dialect will be auto-detected by Spring Boot based on the DB_URL
spring.jpa.hibernate.ddl-auto=update
server.port = ${PORT:8080}

#spring.datasource.hikari.max-lifetime=1800000
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
spring.main.lazy-initialization=true
spring.jpa.open-in-view=true
#MAIL
spring.mail.host=smtp.gmail.com
spring.mail.default-encoding=UTF-8
spring.mail.username=capturenow.in@gmail.com
spring.mail.password = ${MAIL_PASSWORD}
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.test-connection=false
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Other MAIL
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Maximum file size limit for Tomcat
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-http-form-post-size=10485760

spring.boot.admin.jmx.enabled=true
